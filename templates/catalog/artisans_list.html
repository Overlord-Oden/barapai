{% extends 'base.html' %}

{% block title %}Trouver un artisan{% endblock %}

{% block extra_head %}
<style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { display: inline-flex; }
    .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
</style>
{% endblock %}

{% block content %}
<section class="bg-orange-50 border-b border-orange-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-3xl md:text-4xl font-bold text-center mb-2">Trouve ton boss 🔧</h1>
        <p class="text-center text-gray-600 mb-8">Plombiers, électriciens, menuisiers... à Abidjan</p>

        <!-- Formulaire de recherche HTMX -->
        <form hx-get="{% url 'catalog:artisans_list' %}"
              hx-target="#artisans-results"
              hx-push-url="true"
              hx-trigger="input from:#search-input delay:300ms, change from:#category-select, input from:#city-input delay:300ms"
              hx-indicator="#loading-indicator"
              class="bg-white rounded-2xl shadow-md p-4 grid grid-cols-1 md:grid-cols-3 gap-3 max-w-4xl mx-auto">

            <input id="search-input" type="text" name="q" value="{{ query }}"
                   placeholder="🔍 Rechercher un artisan..."
                   class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">

            <select id="category-select" name="category"
                    class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                <option value="">Toutes catégories</option>
                {% for category in categories %}
                    <option value="{{ category.slug }}" {% if category.slug == selected_category %}selected{% endif %}>
                        {{ category.icon }} {{ category.name }}
                    </option>
                {% endfor %}
            </select>

            <input id="city-input" type="text" name="city" value="{{ city }}"
                   placeholder="🏙️ Quartier (ex: Cocody)"
                   class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
        </form>

        <div id="loading-indicator" class="htmx-indicator text-center mt-4">
            <span class="inline-flex items-center gap-2 text-orange-600 font-medium">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25"/>
                    <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"/>
                </svg>
                Recherche...
            </span>
        </div>
    </div>
</section>

<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div id="artisans-results">
        {% include 'catalog/partials/_artisans_results.html' %}
    </div>
</section>
{% endblock %}
