{% extends 'base.html' %}

{% block title %}Erreur serveur · Barapai{% endblock %}

{% block content %}
<div class="min-h-screen bg-background flex items-center justify-center px-6">
  <div class="text-center max-w-md">
    <div class="relative inline-block mb-8">
      <p class="font-display font-bold text-primary-container/10 select-none" style="font-size:10rem;line-height:1">500</p>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-20 h-20 rounded-2xl bg-error flex items-center justify-center shadow-xl shadow-error/30">
          <span class="material-symbols-outlined text-white" style="font-size:36px">warning</span>
        </div>
      </div>
    </div>
    <h1 class="font-display font-bold text-on-surface mb-3" style="font-size:1.75rem">Erreur serveur</h1>
    <p class="font-sans text-on-surface-variant mb-8 leading-relaxed">
      Quelque chose s'est mal passé de notre côté. Notre équipe a été notifiée. Réessaie dans quelques instants.
    </p>
    <a href="/"
       class="inline-flex items-center justify-center gap-2 bg-abidjan-orange-vibrant text-white px-6 py-3.5 rounded-xl font-sans font-bold hover:bg-secondary transition-all">
      <span class="material-symbols-outlined" style="font-size:20px">home</span>
      Retour à l'accueil
    </a>
  </div>
</div>
{% endblock %}
